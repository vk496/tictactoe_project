version: v2
modules:
  - path: api/proto
deps:
  # Gnostic OpenAPI v3 annotations — lets the protos carry request/response
  # examples that protoc-gen-connect-openapi renders into the spec.
  - buf.build/gnostic/gnostic
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_DIRECTORY_MATCH
    - SERVICE_SUFFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
