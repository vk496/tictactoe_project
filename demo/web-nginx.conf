server {
  listen 80;
  root /usr/share/nginx/html;

  # The demo's HTML/JS/CSS are mounted from disk and change as the UI evolves.
  # Ask the browser to revalidate every time so a rebuilt page (e.g. updated
  # dashboard links) is picked up without a manual hard refresh.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
